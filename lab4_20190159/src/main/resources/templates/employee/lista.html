<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">HR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link active" aria-current="page" href="#">Empleados</a>
                <a class="nav-link" href="#">Historial</a>
                <a class="nav-link" href="#">Reportes</a>
            </div>
        </div>
    </div>
</nav>
<main>
    <div class="container px-4 py-5">
        <h1 class="pb-2 border-bottom">Lista de Empleados</h1>
        <form method="post" th:action="@{/employee/buscarPorNombre}">
            <div class="input-group mb-3">
                <input name="searchField" class="form-control" type="text" placeholder="Buscar por nombre" th:value="${textoBuscado}" >
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-outline-secondary" th:href="@{/employee}">Limpiar</a>
            </div>
        </form>
        <table class="table table-sm">
            <tr>
                <th>#</th>
                <th>Nombre </th>
                <th>Apellido</th>
                <th>Puesto</th>
                <th>Departamento</th>
                <th>Número de teléfono</th>
                <th>Salario</th>
                <th></th>
            </tr>
            <tr th:each="employee, info : ${lista}">
                <td th:text="${info.index + 1}"></td>
                <td th:text="${employee.first_name}"></td>
                <td th:text="${employee.last_name}"></td>
                <td th:text="${employee.job_id}"></td>
                <td th:text="${employee.department_id}"></td>
                <td th:text="${employee.phone_number}"></td>
                <td th:text="${employee.salary}"></td>
                <td><a class="btn btn-primary" th:href="@{'/employee/edit?id=' + ${employee.employee_id}}">Editar</a>
                </td>
            </tr>
        </table>
    </div>
</main>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>

</html>
